# Release — fires on a pushed version tag (vX.Y.Z, made by `node tools/release.mjs X.Y.Z`). Gates that the
# the committed version matches the tag, re-runs the fast checks, then publishes the SAME version to all channels.
# Each publisher step is gated, so you can enable channels incrementally.
#
# npm: uses OIDC TRUSTED PUBLISHING — NO long-lived token. Set it up once on npmjs.com → the package's
#   Settings → Trusted Publisher → GitHub Actions (repo TheMasterCoder007/embedded-react, workflow
#   release.yml), then set the repo VARIABLE `PUBLISH_NPM=true` to enable the step. (First publish of a brand-
#   new package may need one manual `npm publish` to create it, then Trusted Publishing for every release after.)
#
# Token secrets (the registries below have no OIDC equivalent):
#   IDF_COMPONENT_API_TOKEN  — ESP Component Registry token (components.espressif.com → Tokens)
#   PLATFORMIO_AUTH_TOKEN    — PlatformIO account token (`pio account token`)
# And set IDF_COMPONENT_NAMESPACE below to your registry namespace before the first ESP-IDF publish.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

env:
  IDF_COMPONENT_NAMESPACE: TheMasterCoder007 # your ESP Component Registry namespace (your GitHub handle)

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IDF_COMPONENT_API_TOKEN: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
      PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the "tag is on master" gate can compute a merge-base
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: bridges/quickjs/js/package-lock.json
          # OIDC trusted publishing: with `id-token: write`, npm >= 11.5.1, and a trusted publisher set up
          # on npmjs.com, npm authenticates with no token. GOTCHA: the trusted publisher's owner/repo must
          # match the GitHub OIDC claim's EXACT case — `TheMasterCoder007`, not `themastercoder007` — or the
          # token exchange silently fails and npm falls back to static auth (→ ENEEDAUTH / E404).

      # The release gate: the committed VERSION + every synced artifact must equal the tag (minus the 'v').
      # `node tools/release.mjs` makes this true by construction; this catches a hand-made / mismatched tag.
      - name: Gate — tag matches committed version
        run: node tools/sync-version.mjs --check "${GITHUB_REF_NAME#v}"

      # Gate: the tagged commit must be on master. This workflow fires on the TAG, not a branch, so without
      # this a tag cut on a feature branch would publish off-branch code (and dangle once the branch is
      # squash/rebase-merged). release.mjs also refuses to run off the default branch; this is the
      # server-side net that also catches a hand-made or force-pushed tag.
      - name: Gate — released commit is on master
        run: |
          git fetch --no-tags --quiet origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::tag ${GITHUB_REF_NAME} points at a commit not on origin/master — release only from master"
            exit 1
          fi
          echo "✓ ${GITHUB_REF_NAME} is on master"

      # Fast, display-free verification before anything is published.
      - name: JS tests
        working-directory: bridges/quickjs/js
        run: npm ci && npx vitest run
      - name: Engine ctests
        run: |
          cmake -S engine -B engine/build-ci
          cmake --build engine/build-ci
          ctest --test-dir engine/build-ci --output-on-failure
      - name: AOT compile smoke
        working-directory: bridges/quickjs/js
        run: |
          node aot/compile.mjs music-player
          gcc -std=c99 -fsyntax-only -I ../../../engine/include -I dist dist/app.gen.c

      # Build the prebuilt WASM simulator (engine + QuickJS + backends → embedded-react.{js,wasm}) and stage
      # it into the npm package's sim/ dir so `npx embedded-react dev` ships ready-to-run — consumers need no
      # Emscripten. Only when publishing npm (it's a few-minute emsdk build). build.mjs derives the toolchain
      # from $EMSDK and uses Unix Makefiles on Linux.
      - name: Set up Emscripten
        if: ${{ vars.PUBLISH_NPM == 'true' }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.13
      - name: Build + stage the prebuilt WASM simulator
        if: ${{ vars.PUBLISH_NPM == 'true' }}
        run: node tools/web-sim/build.mjs

      # Gate the publish on the packaged consumer flow: pack → install into a throwaway app → build the
      # device artifact both ways. Reuses the wasm staged above, so this is the cheap, last line of defense
      # against shipping a package that fails the moment a real user runs `embedded-react build`.
      - name: Consumer smoke (pack + install + build)
        if: ${{ vars.PUBLISH_NPM == 'true' }}
        run: node tools/consumer-smoke.mjs

      # --- Channel 1: npm (OIDC Trusted Publishing — no token; provenance is automatic) ---
      # Enable by setting repo variable PUBLISH_NPM=true AFTER configuring the trusted publisher on npmjs.com.
      - name: Publish to npm
        if: ${{ vars.PUBLISH_NPM == 'true' }}
        working-directory: bridges/quickjs/js
        run: |
          # OIDC trusted publishing needs npm >= 11.5.1. Pin the npm 11 line — not @latest — because
          # npm 12 dropped Node 20 support (EBADENGINE on this runner's Node), and 11.x is the newest
          # major that runs on Node 20.
          npm install -g npm@11
          # Idempotent: skip if this exact version is already on the registry, so a re-run (after a
          # transient failure or a partial release) never dies on "cannot publish over existing version".
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "$pkg@$ver already published — skipping"
          else
            npm publish --provenance --access public
          fi

      # The scaffolder (`npm create embedded-react`). Lockstep version; needs its OWN trusted publisher
      # configured on npmjs.com (package create-embedded-react → Settings → Trusted Publisher → this workflow).
      # First publish of this brand-new package can't use Trusted Publishing (it doesn't exist yet) — do one
      # manual `npm publish` to create it, then configure its trusted publisher for every release after.
      - name: Publish create-embedded-react to npm
        if: ${{ vars.PUBLISH_NPM == 'true' }}
        working-directory: create-embedded-react
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "$pkg@$ver already published — skipping"
          else
            npm publish --provenance --access public
          fi

      # --- Channel 2: ESP-IDF Component Registry (the engine/ component) ---
      - name: Publish to the ESP Component Registry
        if: ${{ env.IDF_COMPONENT_API_TOKEN != '' }}
        uses: espressif/upload-components-ci-action@v1
        with:
          name: embedded-react
          namespace: ${{ env.IDF_COMPONENT_NAMESPACE }}
          directories: engine
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}

      # --- Channel 3: PlatformIO registry (reads root library.json) ---
      - name: Publish to PlatformIO
        if: ${{ env.PLATFORMIO_AUTH_TOKEN != '' }}
        run: |
          python -m pip install --upgrade platformio
          pio pkg publish --no-interactive

      # --- Channel 4: GitHub Release + engine source bundle (the CMake / FetchContent channel) ---
      - name: Build engine source bundle
        run: tar -czf embedded-react-${GITHUB_REF_NAME}-engine-src.tar.gz engine backends LICENSE NOTICE README.md
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: embedded-react-*-engine-src.tar.gz
