<svg width="100%" viewBox="0 0 690 393" role="img" xmlns="http://www.w3.org/2000/svg">
<title>React on Metal YouTube banner</title>
<desc>Dark navy 16:9 banner with centered text, large faint embedded-react v6 icon as background watermark, single PCB trace top and bottom</desc>
<defs>
  <!-- Banner filters (original) -->
  <filter id="bGl" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bTr" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bCo" x="-160%" y="-160%" width="420%" height="420%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="bBg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#0d2035"/>
    <stop offset="100%" stop-color="#040b16"/>
  </radialGradient>
  <radialGradient id="bSub" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#122034"/>
    <stop offset="55%"  stop-color="#0a1828"/>
    <stop offset="100%" stop-color="#060f1e"/>
  </radialGradient>

  <!-- Icon v6 filters / gradients (namespaced to avoid conflicts) -->
  <filter id="iGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="iNucleus" x="-300%" y="-300%" width="700%" height="700%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <radialGradient id="iChip" cx="100" cy="100" r="68" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#112030"/>
    <stop offset="55%"  stop-color="#091828"/>
    <stop offset="100%" stop-color="#060f1e"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="680" height="383" fill="#040b16"/>

<!-- ── Watermark: embedded-react icon v6 ── -->
<g opacity="0.09" transform="translate(175, 26) scale(1.65)">

  <!-- Background disc -->
  <circle cx="100" cy="100" r="98" fill="url(#bBg)"/>
  <circle cx="100" cy="100" r="97.5" fill="none" stroke="#38BDF8" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- 16 QFN pads · 22.5° pitch -->
  <g fill="#38BDF8" fill-opacity="0.9" filter="url(#iGlow)">
    <g transform="translate(100,100) rotate(0)">    <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(22.5)"> <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(45)">   <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(67.5)"> <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(90)">   <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(112.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(135)">  <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(157.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(180)">  <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(202.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(225)">  <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(247.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(270)">  <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(292.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(315)">  <rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
    <g transform="translate(100,100) rotate(337.5)"><rect x="74" y="-4" width="10" height="8" rx="1.5"/></g>
  </g>

  <!-- Chip body -->
  <circle cx="100" cy="100" r="68"
          fill="url(#iChip)"
          stroke="#38BDF8" stroke-width="1.4" stroke-opacity="0.5"
          filter="url(#iGlow)"/>

  <!-- PCB traces — signal (1.0) -->
  <g stroke="#38BDF8" stroke-width="1.0" stroke-linecap="round"
     stroke-linejoin="round" fill="none"
     stroke-opacity="0.72" filter="url(#iGlow)">
    <polyline points="86,74 78,66 78,58"/>
    <polyline points="114,74 122,66 122,58"/>
    <line x1="79"  y1="79"  x2="62"  y2="62"/>
    <line x1="121" y1="79"  x2="138" y2="62"/>
    <line x1="79"  y1="121" x2="62"  y2="138"/>
    <line x1="121" y1="121" x2="138" y2="138"/>
    <polyline points="86,126 78,134 78,142"/>
    <polyline points="114,126 122,134 122,142"/>
  </g>

  <!-- PCB traces — data (1.3) -->
  <g stroke="#38BDF8" stroke-width="1.3" stroke-linecap="round"
     stroke-linejoin="round" fill="none"
     stroke-opacity="0.76" filter="url(#iGlow)">
    <line x1="100" y1="70"  x2="100" y2="58"/>
    <line x1="100" y1="130" x2="100" y2="142"/>
  </g>

  <!-- Via pads — annular ring + dot -->
  <g filter="url(#iGlow)">
    <g fill="none" stroke="#38BDF8" stroke-width="1.15" stroke-opacity="0.68">
      <circle cx="78"  cy="58"  r="3.5"/>
      <circle cx="100" cy="58"  r="3.5"/>
      <circle cx="122" cy="58"  r="3.5"/>
      <circle cx="62"  cy="62"  r="3.5"/>
      <circle cx="138" cy="62"  r="3.5"/>
      <circle cx="62"  cy="138" r="3.5"/>
      <circle cx="138" cy="138" r="3.5"/>
      <circle cx="78"  cy="142" r="3.5"/>
      <circle cx="100" cy="142" r="3.5"/>
      <circle cx="122" cy="142" r="3.5"/>
    </g>
    <g fill="#38BDF8" fill-opacity="0.88">
      <circle cx="78"  cy="58"  r="1.4"/>
      <circle cx="100" cy="58"  r="1.4"/>
      <circle cx="122" cy="58"  r="1.4"/>
      <circle cx="62"  cy="62"  r="1.4"/>
      <circle cx="138" cy="62"  r="1.4"/>
      <circle cx="62"  cy="138" r="1.4"/>
      <circle cx="138" cy="138" r="1.4"/>
      <circle cx="78"  cy="142" r="1.4"/>
      <circle cx="100" cy="142" r="1.4"/>
      <circle cx="122" cy="142" r="1.4"/>
    </g>
  </g>

  <!-- Mask: hide trace ends behind hub ring -->
  <circle cx="100" cy="100" r="30" fill="url(#iChip)"/>

  <!-- Hub ring -->
  <circle cx="100" cy="100" r="30"
          fill="none" stroke="#38BDF8"
          stroke-width="0.9" stroke-opacity="0.72"
          filter="url(#iGlow)"/>

  <!-- React atom: three orbital ellipses at 0°, 60°, 120° -->
  <g transform="translate(100,100)"
     stroke="#38BDF8" stroke-width="1.6"
     fill="none" stroke-opacity="0.9"
     filter="url(#iGlow)">
    <ellipse rx="24" ry="8"/>
    <ellipse rx="24" ry="8" transform="rotate(60)"/>
    <ellipse rx="24" ry="8" transform="rotate(120)"/>
  </g>

  <!-- Nucleus -->
  <circle cx="100" cy="100" r="4.5" fill="#38BDF8" filter="url(#iNucleus)"/>
  <circle cx="98.2" cy="98.2" r="1.8" fill="white" fill-opacity="0.42"/>

</g>

<!-- PCB border traces top + bottom -->
<polyline points="0,13 55,13 68,7 310,7 323,13 680,13"
          stroke="#38BDF8" stroke-width="0.9" stroke-linecap="round"
          stroke-linejoin="round" fill="none" stroke-opacity="0.2"
          filter="url(#bTr)"/>
<polyline points="0,370 55,370 68,376 310,376 323,370 680,370"
          stroke="#38BDF8" stroke-width="0.9" stroke-linecap="round"
          stroke-linejoin="round" fill="none" stroke-opacity="0.2"
          filter="url(#bTr)"/>

<!-- Corner / junction dots -->
<g fill="#38BDF8" opacity="0.3" filter="url(#bTr)">
  <circle cx="55"  cy="13"  r="2.4"/><circle cx="323" cy="13"  r="2.4"/>
  <circle cx="55"  cy="370" r="2.4"/><circle cx="323" cy="370" r="2.4"/>
  <circle cx="145" cy="7"   r="1.7"/><circle cx="220" cy="7"   r="1.7"/>
  <circle cx="450" cy="13"  r="1.7"/><circle cx="560" cy="13"  r="1.7"/>
  <circle cx="145" cy="376" r="1.7"/><circle cx="220" cy="376" r="1.7"/>
  <circle cx="450" cy="370" r="1.7"/><circle cx="560" cy="370" r="1.7"/>
</g>

<!-- Text -->
<text x="340" y="182" text-anchor="middle" fill="#38BDF8"
      font-size="46" font-weight="600" letter-spacing="-0.5"
      style="font-family: var(--font-sans), system-ui, sans-serif;">React on Metal</text>
<text x="340" y="210" text-anchor="middle" fill="#38BDF8" opacity="0.52"
      font-size="15" font-weight="400"
      style="font-family: var(--font-sans), system-ui, sans-serif;">Building React UI for embedded systems</text>
<text x="340" y="234" text-anchor="middle" fill="#38BDF8" opacity="0.32"
      font-size="13" font-weight="400"
      style="font-family: var(--font-mono), 'Courier New', monospace;">@reactonmetal · embedded-react by TheMasterCoder007</text>
</svg>
