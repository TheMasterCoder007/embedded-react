<svg xmlns="http://www.w3.org/2000/svg" viewBox="95 95 410 410" width="410" height="410">

  <defs>
    <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes beat { 0%,100%{opacity:1} 50%{opacity:.72} }
      .beat { animation: beat 2.4s ease-in-out infinite; }
    </style>

    <!-- Conic gradient: replaces the 90 faux-gradient ghost segments with one angular sweep around the
         dial centre. `<conicGradient>` is an embedded-react extension (SVG has no conic), so the stroke
         carries a fallback solid colour after the url() — standard viewers (browsers, Inkscape) render a
         flat arc, embedded-react renders the real sweep. The arc spans 270° starting at -135° (bottom-left),
         so the colour stops occupy t=0..0.75 of the full circle (the bottom 90° gap is unstroked). -->
    <conicGradient id="ghost" gradientUnits="userSpaceOnUse" cx="300" cy="300" from="-135">
      <stop offset="0"     stop-color="rgb(57,189,248)"/>
      <stop offset="0.125" stop-color="rgb(98,203,250)"/>
      <stop offset="0.25"  stop-color="rgb(145,217,252)"/>
      <stop offset="0.375" stop-color="rgb(224,230,215)"/>
      <stop offset="0.5"   stop-color="rgb(253,194,86)"/>
      <stop offset="0.625" stop-color="rgb(251,139,52)"/>
      <stop offset="0.75"  stop-color="rgb(240,71,65)"/>
    </conicGradient>
  </defs>

  <!-- Main arc: shadow -->
  <path d="M169.19,430.81 A185,185 0 1 1 430.81,430.81" fill="none" stroke="#0c0c0c" stroke-width="40" stroke-linecap="butt"/>
  <!-- Main arc: dark base track -->
  <path d="M169.19,430.81 A185,185 0 1 1 430.81,430.81" fill="none" stroke="#1e2a38" stroke-width="30" stroke-linecap="butt"/>

  <!-- Ghost gradient track: one conic-stroked arc (was 90 faux-gradient segments). -->
  <path d="M169.19,430.81 A185,185 0 1 1 430.81,430.81" fill="none" stroke="url(#ghost) #8ad0f0" stroke-width="30" stroke-linecap="butt" opacity="0.2"/>

  <!-- Active arc: inner-edge shimmer -->
  <path d="M178.02,421.98 A172.5,172.5 0 0 1 273.02,129.62" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="butt"/>

  <!-- Inner decorative rings -->
  <circle cx="300" cy="300" r="131" fill="none" stroke="#1e2a38" stroke-width="2.5"/>
  <circle cx="300" cy="300" r="127" fill="none" stroke="#192535" stroke-width="1" stroke-dasharray="5 10" opacity="0.7"/>
  <circle cx="300" cy="300" r="123" fill="none" stroke="#161e2c" stroke-width="0.5"/>

</svg>
